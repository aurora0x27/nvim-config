repos:
  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.1.0
    hooks:
      - id: stylua # or stylua-system / stylua-github
        files: '^(lua|ftplugin|lsp|\.nvim)\/.*[a-zA-Z0-9_]\.lua$'
  - repo: https://github.com/Calinou/pre-commit-luacheck
    rev: v1.0.0
    hooks:
      - id: luacheck
        files: '^(lua|ftplugin|lsp|\.nvim)\/.*[a-zA-Z0-9_]\.lua$'
